# ---------------------------------------------------------------
# .github/workflows/terraform.yml
#
# Automates Terraform on every push and pull request:
#   - Pull request  -> runs `terraform plan` (preview only)
#   - Push to main  -> runs `terraform apply` (deploys for real)
#
# Setup BEFORE this works:
#   1. In GitHub: Settings -> Secrets and variables -> Actions
#   2. Add two repository secrets:
#        AWS_ACCESS_KEY_ID
#        AWS_SECRET_ACCESS_KEY
#      (Generate these from AWS IAM. Use a dedicated IAM user
#       with only the permissions needed for this project.)
# ---------------------------------------------------------------

name: Terraform

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    branches: [main]
    paths: ["infra/**"]

# Stop two pipeline runs from clashing on the same branch.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infra

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform Validate
        run: terraform validate

      # On a PR, just preview - never apply
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      # On push to main, actually apply
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve

